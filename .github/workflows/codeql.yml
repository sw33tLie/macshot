name: "CodeQL"

on:
  push:
    branches: [main]
    paths-ignore:
      - "website/**"
      - "**/*.md"
      - "appcast*.xml"
  pull_request:
    branches: [main]
    paths-ignore:
      - "website/**"
      - "**/*.md"
      - "appcast*.xml"
  schedule:
    - cron: "23 4 * * 1"

jobs:
  analyze-swift:
    name: Analyze (swift)
    runs-on: macos-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The Swift autobuilder can't handle file-system-synchronized Xcode
      # groups (it sees no source files in any target), so build manually.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      - name: Select Xcode
        run: |
          # Pick the highest installed Xcode 26.x so the macOS 26 SDK
          # (NSGlassEffectView) is available.
          XC=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XC" ]; then XC=$(ls -d /Applications/Xcode*.app | sort -V | tail -1); fi
          echo "Using $XC"
          sudo xcode-select -s "$XC/Contents/Developer"
          xcodebuild -version

      - name: Build
        run: |
          xcodebuild \
            -project macshot.xcodeproj \
            -scheme macshot \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -resolvePackageDependencies

          xcodebuild \
            -project macshot.xcodeproj \
            -scheme macshot \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:swift"

  analyze-actions:
    name: Analyze (actions)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: actions
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:actions"
